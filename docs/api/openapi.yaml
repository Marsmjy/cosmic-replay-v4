openapi: 3.0.3
info:
  title: cosmic-replay API
  description: |
    苍穹表单协议回放自动化测试工具 API
    
    ## 核心功能
    - HAR文件导入并生成YAML用例
    - 用例编辑、执行、监控
    - 批量执行任务管理
    - 实时SSE事件推送
    - 执行报告生成
    
    ## 认证
    使用 X-API-Key 头进行认证：
    ```
    X-API-Key: your-api-key
    ```
  version: 2.0.0
  contact:
    name: Mars
    url: https://github.com/Marsmjy/cosmic-replay-v2
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://127.0.0.1:8765
    description: 本地开发服务器

tags:
  - name: cases
    description: 用例管理
  - name: execution
    description: 用例执行
  - name: tasks
    description: 批量任务
  - name: config
    description: 配置管理
  - name: logs
    description: 日志查询

paths:
  /api/cases:
    get:
      tags: [cases]
      summary: 列出所有用例
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Case'

  /api/cases/{name}:
    get:
      tags: [cases]
      summary: 获取用例详情
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseDetail'
        '404':
          description: 用例不存在

  /api/cases/{name}/run:
    post:
      tags: [execution]
      summary: 执行用例
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                env_id:
                  type: string
                  description: 环境ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  run_id:
                    type: string

  /api/runs/{run_id}/events:
    get:
      tags: [execution]
      summary: SSE事件流
      description: 返回Server-Sent Events流，实时推送执行事件
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE流
          content:
            text/event-stream:
              schema:
                type: string

  /api/tasks:
    get:
      tags: [tasks]
      summary: 列出所有任务
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      tags: [tasks]
      summary: 创建批量任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - case_names
              properties:
                name:
                  type: string
                  description: 任务名称
                case_names:
                  type: array
                  items:
                    type: string
                  description: 用例名称列表
                env_id:
                  type: string
                  description: 环境ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  task_id:
                    type: string

  /api/tasks/{task_id}/start:
    post:
      tags: [tasks]
      summary: 启动任务
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  /api/tasks/{task_id}/report:
    get:
      tags: [tasks]
      summary: 获取任务报告
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'

  /api/envs:
    get:
      tags: [config]
      summary: 列出所有环境
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Env'

  /api/health:
    get:
      tags: [config]
      summary: 健康检查
      responses:
        '200':
          description: 服务健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  cases_count:
                    type: integer
                  envs_count:
                    type: integer
                  uptime_seconds:
                    type: integer

components:
  schemas:
    Case:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        main_form_id:
          type: string
        step_count:
          type: integer
        tags:
          type: array
          items:
            type: string

    CaseDetail:
      allOf:
        - $ref: '#/components/schemas/Case'
        - type: object
          properties:
            yaml:
              type: string
            description:
              type: string

    Task:
      type: object
      properties:
        task_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, cancelled]
        created_at:
          type: string
          format: date-time
        total_count:
          type: integer
        passed_count:
          type: integer
        failed_count:
          type: integer
        duration_s:
          type: number

    Report:
      type: object
      properties:
        report_id:
          type: string
        task_id:
          type: string
        task_name:
          type: string
        generated_at:
          type: string
          format: date-time
        env:
          type: string
        summary:
          type: object
          properties:
            total_cases:
              type: integer
            passed_cases:
              type: integer
            failed_cases:
              type: integer
            total_steps:
              type: integer
            passed_steps:
              type: integer
            total_duration_s:
              type: number
            pass_rate:
              type: number
        case_results:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              passed:
                type: boolean
              step_ok:
                type: integer
              step_count:
                type: integer
              duration_s:
                type: number
              error:
                type: string

    Env:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        base_url:
          type: string

    ApiError:
      type: object
      properties:
        detail:
          type: string
          example: Resource not found

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API认证密钥

security:
  - ApiKeyAuth: []
